services:
  db:
    image: pgvector/pgvector:pg17
    container_name: hone-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: hone
      POSTGRES_USER: hone
      POSTGRES_PASSWORD: ${SERVICE_PASSWORD_DB}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U hone -d hone']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/tschuba/hone-api:latest
    container_name: hone-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://hone:${SERVICE_PASSWORD_DB}@db:5432/hone?connection_limit=5&pool_timeout=10
      SESSION_SECRET: ${SERVICE_PASSWORD_SESSION}
      CSRF_SECRET: ${SERVICE_PASSWORD_CSRF}
      APP_URL: ${SERVICE_URL_WEB}
      NODE_ENV: production
      PORT: 3001
      AI_PROVIDER: ${AI_PROVIDER:-ollama}
      AI_BASE_URL: ${AI_BASE_URL:-http://ollama:11434}
      AI_MODEL: ${AI_MODEL:-llama3.2}
      USE_LOCAL_AUTH_ONLY: ${USE_LOCAL_AUTH_ONLY:-false}
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_ROLE_CLAIM: ${OIDC_ROLE_CLAIM:-groups}
      OIDC_ADMIN_VALUE: ${OIDC_ADMIN_VALUE:-admin}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
    expose:
      - '3001'
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://127.0.0.1:3001/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy

  web:
    image: ghcr.io/tschuba/hone-web:latest
    container_name: hone-web
    restart: unless-stopped
    environment:
      SERVICE_FQDN_WEB_80: ${SERVICE_FQDN_WEB_80}
    expose:
      - '80'
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://127.0.0.1/ || exit 1']
      interval: 10s
      timeout: 5s
      retries: 3

  # Optional: disable by removing this service or using --profile ai
  ollama:
    image: ollama/ollama
    container_name: hone-ollama
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://127.0.0.1:11434/ || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    profiles:
      - ai

volumes:
  db-data:
  ollama-data:
